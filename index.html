<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Year With You</title>
  <meta
    name="description"
    content="A full-screen anniversary website with a public golden retriever 3D model, spatial-style story gallery, heartfelt message reveal, and floating music player."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="./styles.css">
  <script
    type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
  ></script>
</head>
<body>
  <div class="background-wash" aria-hidden="true">
    <span class="wash-orb orb-one"></span>
    <span class="wash-orb orb-two"></span>
    <span class="wash-orb orb-three"></span>
    <span class="wash-grid"></span>
  </div>
  <canvas id="petal-canvas" aria-hidden="true"></canvas>

  <header class="journey-nav" aria-label="Story navigation">
    <button class="journey-nav__button is-active" type="button" data-scroll-target="hero">Home</button>
    <button class="journey-nav__button" type="button" data-scroll-target="gallery-intro">Gallery</button>
    <button class="journey-nav__button" type="button" data-scroll-target="message-stage">Letter</button>
  </header>

  <section class="hero-stage" id="hero" data-journey-section="hero">
    <model-viewer
      id="dog-viewer"
      alt="A low poly pet model"
      camera-controls
      auto-rotate
      interaction-prompt="none"
      disable-zoom
      shadow-intensity="0"
      exposure="1.02"
      camera-orbit="32deg 78deg auto"
      min-camera-orbit="auto 58deg auto"
      max-camera-orbit="auto 102deg auto"
      loading="eager"
      touch-action="pan-y"
    ></model-viewer>

    <div class="hero-menu" id="hero-menu" aria-label="Home menu">
      <div class="hero-menu__row">
        <button class="hero-menu__button" type="button" data-hero-target="gallery-intro">
          Gallery
        </button>
        <button class="hero-menu__button" type="button" data-hero-target="message-stage">
          Message
        </button>
      </div>

      <div class="hero-menu__row hero-menu__row--models" role="tablist" aria-label="Choose the 3D model">
        <button
          class="hero-menu__button hero-menu__button--model is-active"
          type="button"
          data-model-key="pocky"
          role="tab"
          aria-selected="true"
        >
          Pocky
        </button>
        <button
          class="hero-menu__button hero-menu__button--model"
          type="button"
          data-model-key="yuki"
          role="tab"
          aria-selected="false"
        >
          Yuki
        </button>
      </div>

      <p class="hero-menu__status" id="hero-status" aria-live="polite">
        Pocky is on screen. Drag to orbit.
      </p>
    </div>
  </section>

  <main class="story-shell">
    <section class="gallery-intro section-shell" id="gallery-intro" data-journey-section="gallery">
      <p class="section-shell__eyebrow">Gallery</p>
    </section>

    <section class="memory-stack" id="memory-stack" aria-label="Memory gallery"></section>

    <section class="message-transition" id="message-transition">
      <p class="message-transition__eyebrow">One more thing</p>
      <h2>A Short Message For You.</h2>
    </section>

    <section class="message-stage" id="message-stage" data-journey-section="message">
      <div class="message-stage__inner">
        <button class="letter-toggle" id="letter-toggle" type="button" aria-expanded="false">
          Open the note
        </button>

        <article class="letter-card" id="letter-card">
          <div class="letter-card__paper">
            <p class="letter-greeting">Dear Amelia Cheung 章馨予,</p>
            <div class="message-content" id="message-content"></div>
            <p class="letter-signature">From<br><span>胡韦珩 Michael Hu
</span></p>
          </div>
        </article>
      </div>
    </section>
  </main>

  <aside class="music-widget" aria-label="Background music player">
    <div class="music-cover" id="music-cover" aria-hidden="true"></div>

    <div class="music-meta">
      <p class="music-meta__eyebrow">Playlist For You</p>
      <h3 id="music-title">Bluebell Waltz</h3>
      <p id="music-artist">Soft Tape Mix</p>
    </div>

    <div class="music-controls" aria-label="Playback controls">
      <button class="icon-button" id="prev-track" type="button" aria-label="Previous song">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 6h2v12H7V6Zm10.5 0L10 12l7.5 6V6Z" fill="currentColor"></path>
        </svg>
      </button>
      <button class="icon-button icon-button--primary" id="play-pause" type="button" aria-label="Play music">
        <svg class="play-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 6.5v11l9-5.5-9-5.5Z" fill="currentColor"></path>
        </svg>
        <svg class="pause-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 6h3v12H8V6Zm5 0h3v12h-3V6Z" fill="currentColor"></path>
        </svg>
      </button>
      <button class="icon-button" id="next-track" type="button" aria-label="Next song">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 6h2v12h-2V6ZM6.5 6 14 12l-7.5 6V6Z" fill="currentColor"></path>
        </svg>
      </button>
    </div>

    <label class="volume-control" for="volume-slider">
      <span>Volume</span>
      <input id="volume-slider" type="range" min="0" max="100" step="0.25" value="31.25">
    </label>

    <p class="music-status" id="music-status">The playlist starts softly and keeps looping in the corner.</p>
  </aside>

  <script type="module" src="./main.js"></script>
</body>
</html>
